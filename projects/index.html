<html lang="en">
<head>

  <style>

<body>
  <a class="back" href="../">W</a>
  <div class="page">
    <p class="page-title">Projects</p>

    <div class="years">
      <button class="year-btn" data-year="2026">2026</button>
      <button class="year-btn" data-year="2025">2025</button>

      <button class="year-btn" data-year="2022">2022</button>
    </div>

    <!-- newest year first — add new <li> entries at the top -->
    <ul class="article-list">
      <li class="article-item" data-year="2026">

      <li class="article-item" data-year="2025">
        <span class="article-year">2025</span>
        <a class="article-title" href="heights-casino.html">Heights Casino</a>
      </li>
      <li class="article-item" data-year="2025">
        <span class="article-year">2025</span>
        <a class="article-title" href="farber-house.html">Saint Ann's School Farber Building</a>
      </li>
      <li class="article-item" data-year="2025">

      </li>
      <li class="article-item" data-year="2025">
        <span class="article-year">2025</span>
        <a class="article-title" href="education-competition.html">Education Competition</a>
      </li>
      <li class="article-item" data-year="2024">
        <span class="article-year">2024</span>
        <a class="article-title" href="redhook-rain-story.html">Redhook Rain Story</a>
      </li>
      <li class="article-item" data-year="2024">
        <span class="article-year">2024</span>

      </li>
    </ul>
  </div>

  <script>
    const btns  = document.querySelectorAll('.year-btn');
    const items = document.querySelectorAll('.article-item');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const year     = btn.dataset.year;
        const isActive = btn.classList.toggle('active');
        btns.forEach(b => { if (b !== btn) b.classList.remove('active'); });
        items.forEach(item => {
          item.style.display = (!isActive || item.dataset.year === year) ? '' : 'none';
        });
      });
    });
  </script>
</body>
