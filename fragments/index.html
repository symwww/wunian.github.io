<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragments — WUNIAN</title>
  <meta name="description" content="Wunian Fragments: sound pieces and short experimental works collected as numbered fragments, browsable by year.">
  <link rel="canonical" href="https://wuniancollective.com/fragments/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="WUNIAN">
  <meta property="og:title" content="Fragments — WUNIAN">
  <meta property="og:description" content="Sound pieces and short experimental works collected as numbered fragments.">
  <meta property="og:url" content="https://wuniancollective.com/fragments/">
  <meta property="og:image" content="https://wuniancollective.com/og-default.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="https://wuniancollective.com/og-default.png">
  <meta name="twitter:title" content="Fragments — WUNIAN">
  <meta name="twitter:description" content="Sound pieces and short experimental works collected as numbered fragments.">

  <meta name="theme-color" content="#ffffff">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      display: block;
      min-height: 100vh;
      height: auto;
      padding: 8rem 2rem 8rem;
    }

    /* year | ff-code | title */
    .article-item {
      grid-template-columns: 4rem 3rem 1fr;
    }
  </style>
</head>
<body>
  <a class="back" href="../" aria-label="Back to WUNIAN home">W</a>
  <main class="page">
    <h1 class="page-title">Fragments</h1>

    <div class="years" role="group" aria-label="Filter fragments by year">
      <button class="year-btn" data-year="2026">2026</button>
    </div>

    <!-- newest year first — add new <li> entries at the top -->
    <ul class="article-list">
      <li class="article-item" data-year="2026">
        <span class="article-year">2026</span>
        <span class="article-code">ff01</span>
        <a class="article-title" href="wunian-night-01.html">Wunian Night 01</a>
      </li>
    </ul>
  </main>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Fragments — WUNIAN",
    "url": "https://wuniancollective.com/fragments/",
    "inLanguage": "en",
    "isPartOf": { "@type": "WebSite", "name": "WUNIAN", "url": "https://wuniancollective.com/" },
    "about": "Sound and experimental fragments by Wunian"
  }
  </script>

  <script>
    const btns  = document.querySelectorAll('.year-btn');
    const items = document.querySelectorAll('.article-item');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const year     = btn.dataset.year;
        const isActive = btn.classList.toggle('active');
        btns.forEach(b => { if (b !== btn) b.classList.remove('active'); });
        items.forEach(item => {
          item.style.display = (!isActive || item.dataset.year === year) ? '' : 'none';
        });
      });
    });
  </script>
</body>
</html>
