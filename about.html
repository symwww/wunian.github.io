<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — WUNIAN</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .about {
      max-width: 38rem;
      padding: 0 2rem;
    }

    .about p {
      font-size: clamp(0.8rem, 1.8vw, 0.95rem);
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    .about .collective {
      font-size: clamp(1.3rem, 3vw, 1.5rem);
      margin-bottom: 2rem;
    }

    .about .byline {
      margin-top: 1.5rem;
      opacity: 0.45;
    }

    .contact {
      margin-top: 3rem;
      display: flex;
      gap: 2rem;
    }

    .contact a {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      color: #000000;
      transition: opacity 0.2s ease;
    }

    .contact a:hover {
      opacity: 0.35;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">W</a>
  <div class="about">
    <p class="collective">Wunian (vun-ee-ahn) Collective</p>
    <p>A personal archive of architecture, writing, memory, and unfinished fragments.</p>
    <p class="byline">Built and maintained by Leslie Sheng.</p>
    <div class="contact">
      <a href="mailto:leslie@wuniancollective.xyz">Email</a>
      <a href="https://www.instagram.com/wuniancollective/" target="_blank" rel="noopener">Instagram</a>
    </div>
  </div>
</body>
</html>
